services:
  db:
    image: postgres:16-alpine
    container_name: primepay_db
    environment:
      POSTGRES_USER: primetrade
      POSTGRES_PASSWORD: primetrade123
      POSTGRES_DB: primetrade_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primetrade -d primetrade_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: primepay_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: primepay_api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://primetrade:primetrade123@db:5432/primetrade_db
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: primepay_frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
