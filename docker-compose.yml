version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: primetrade_db
    environment:
      POSTGRES_USER: primetrade
      POSTGRES_PASSWORD: primetrade123
      POSTGRES_DB: primetrade_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primetrade -d primetrade_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: primetrade_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: primetrade_api
    environment:
      DATABASE_URL: postgresql://primetrade:primetrade123@db:5432/primetrade_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: change-this-to-a-random-secret-in-production-min-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: primetrade_frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
